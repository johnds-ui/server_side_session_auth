services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: hotel_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotel_db -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build: .
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000", "--noreload"]
    volumes:
      - .:/app
      - /app/__pycache__
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=hotel_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - DJANGO_SECRET_KEY=your-secret-key-here
      - DJANGO_DEBUG=False
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
