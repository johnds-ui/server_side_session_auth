{% extends 'base.html' %}
{% block title %}Password Updated{% endblock %}
{% block content %}
<section class="px-4 pt-5 pb-4 max-w-6xl mx-auto">
    <p class="text-[10px] font-semibold tracking-widest text-red-500 uppercase mb-1 flex items-center gap-2">
        <span class="w-1.5 h-1.5 bg-red-500 rounded-full inline-block"></span>
        PASSWORD UPDATED
    </p>
    <h1 class="text-2xl font-extrabold text-gray-900 leading-tight tracking-tight mb-2">Password Updated</h1>
    <p class="text-gray-400 text-sm max-w-xl leading-relaxed">Your password was changed successfully.</p>
    <div class="mt-4 h-px bg-gray-100"></div>
</section>

<section class="mx-auto max-w-md py-4">
    <div class="rounded-xl bg-white p-4 text-center shadow-[0_1px_6px_rgba(0,0,0,0.06)]">
        <div class="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-full bg-emerald-50 text-emerald-600">
            <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="m5 13 4 4L19 7"></path></svg>
        </div>
        <a href="{% url 'accounts:login' %}" class="mt-6 inline-flex items-center rounded-xl bg-[#E23744] px-5 py-3 text-sm font-semibold text-white transition hover:bg-[#c92d39]">Go to Login</a>
    </div>
</section>
{% endblock %}
