{% extends 'base.html' %}
{% block title %}403 | Forbidden{% endblock %}
{% block content %}
<section class="px-4 pt-5 pb-4 max-w-6xl mx-auto">
    <p class="text-[10px] font-semibold tracking-widest text-red-500 uppercase mb-1 flex items-center gap-2">
        <span class="w-1.5 h-1.5 bg-red-500 rounded-full inline-block"></span>
        403 ERROR
    </p>
    <h1 class="text-2xl font-extrabold text-gray-900 leading-tight tracking-tight mb-2">Forbidden</h1>
    <p class="text-gray-400 text-sm max-w-xl leading-relaxed">You do not have permission to access this page.</p>
    <div class="mt-4 h-px bg-gray-100"></div>
</section>

<section class="mx-auto max-w-xl py-10">
    <div class="rounded-xl bg-white p-4 text-center shadow-card">
        <p class="text-6xl font-extrabold text-[#E23744]">403</p>
        <a href="{% url 'accounts:login' %}" class="mt-6 inline-flex items-center rounded-xl bg-[#E23744] px-5 py-3 text-sm font-semibold text-white transition hover:bg-[#c92d39]">Login</a>
    </div>
</section>
{% endblock %}
